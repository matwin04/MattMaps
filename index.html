<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Metro Realtime Vehicles</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <link rel="stylesheet" href="styles.css" />

  <style>
    .popup-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .delay-late {
      color: red;
      font-weight: bold;
    }

    .delay-ontime {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="map"></div>

  <aside id="sidebar">
    <div class="sidebar-header">
      <h2>Nearby Departures</h2>
      <span id="departure-count">0</span>
    </div>
    <div class="sidebar-body">
      <table class="vehicle-table">
        <thead>
          <tr>
            <th>Route</th>
            <th>Headsign</th>
            <th>Stop</th>
            <th>ETA</th>
          </tr>
        </thead>
        <tbody id="departure-table-body">
          <!-- rows injected by script.js -->
        </tbody>
      </table>
    </div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="script.js"></script>
</body>
</html>
